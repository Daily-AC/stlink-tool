; Zadig configuration shipped with stlink-tool.
; Loaded by Zadig at startup from its current working directory.
; Goal: minimize clicks during driver fix — pre-select WinUSB and exit on success.

[general]
  advanced_mode = false
  exit_on_success = true
  log_level = 1

[device]
  ; Show all devices (including ones already with a driver) so the ST-Link
  ; entry is always visible regardless of current binding state.
  list_all = true
  include_hubs = false
  trim_whitespaces = true

[driver]
  ; 0 = WinUSB, 1 = libusb0.sys, 2 = libusbK.sys, 3 = Custom
  default_driver = 0
  extract_only = false
