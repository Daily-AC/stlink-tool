name: Build wdi-simple.exe (libwdi)

# Manually-triggered, one-off helper that compiles libwdi's wdi-simple.exe
# from upstream source on a Windows runner. The resulting binary is uploaded
# as a workflow artifact; we then commit it to vendor/ in this repo.
#
# Build recipe mirrors libwdi's own CI (.github/workflows/codeql.yml in the
# pbatard/libwdi repo): the embedder project needs WDK 8.0's WdfCoInstaller
# DLL plus libusb0 and libusbK driver redistributables.

on:
  workflow_dispatch:
    inputs:
      libwdi_ref:
        description: 'libwdi git ref to build (tag or branch)'
        required: false
        default: 'v1.5.1'

env:
  WDK_URL: https://go.microsoft.com/fwlink/p/?LinkID=253170
  LIBUSB0_URL: https://github.com/mcuee/libusb-win32/releases/download/release_1.4.0.0/libusb-win32-bin-1.4.0.0.zip
  LIBUSBK_URL: https://github.com/mcuee/libusbk/releases/download/V3.1.0.0/libusbK-3.1.0.0-bin.7z

jobs:
  build:
    name: Build wdi-simple.exe x64
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout libwdi
        uses: actions/checkout@v4
        with:
          repository: pbatard/libwdi
          ref: ${{ github.event.inputs.libwdi_ref }}

      - name: Download WDK 8.0 + libusb0 + libusbK redistributables
        shell: cmd
        run: |
          curl -L "%WDK_URL%" -o wdk-redist.msi
          curl -L "%LIBUSB0_URL%" -o libusb0-redist.zip
          curl -L "%LIBUSBK_URL%" -o libusbk-redist.7z
          msiexec /a wdk-redist.msi /qn TARGETDIR=%CD%\wdk
          7z x libusb0-redist.zip -y
          7z x libusbk-redist.7z -y
          del *.zip
          del *.7z
          move libusb-win32* libusb0
          move libusbK* libusbk
          if not exist libusbk\bin\sys\amd64\libusbK.sys (
            echo ERROR: libusbK extraction did not produce expected structure
            dir /s /b libusbk
            exit /b 1
          )
          echo OK: libusbK structure verified

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution (Release|x64)
        shell: cmd
        run: |
          msbuild libwdi.sln /m /p:Configuration=Release,Platform=x64,BuildMacros="WDK_DIR=\"../wdk/Windows Kits/8.0\";LIBUSB0_DIR=\"../libusb0\";LIBUSBK_DIR=\"../libusbk/bin\"" /verbosity:minimal

      - name: Locate and stage artifact
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path . -Recurse -Filter wdi-simple.exe `
                 | Where-Object { $_.FullName -match 'Release' -and $_.FullName -match 'x64' } `
                 | Select-Object -First 1
          if (-not $exe) { throw "wdi-simple.exe not found after build" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $exe.FullName dist\wdi-simple.exe
          (Get-FileHash dist\wdi-simple.exe -Algorithm SHA256).Hash | Out-File -Encoding ascii dist\wdi-simple.exe.sha256
          Get-ChildItem dist | Format-Table Name,Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wdi-simple-x64
          path: dist/
          if-no-files-found: error
          retention-days: 90
