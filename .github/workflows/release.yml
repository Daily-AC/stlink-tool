name: Release

on:
  push:
    tags: ['v*']
  # Manual dry-run: build the .exe and upload as a workflow artifact, no release.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (Windows x64)
    runs-on: windows-latest
    permissions:
      contents: write   # needed for softprops/action-gh-release on tag triggers

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/stlink-tool.exe dist/stlink-tool-windows-x64.exe
          cd dist
          sha256sum stlink-tool-windows-x64.exe > stlink-tool-windows-x64.exe.sha256
          ls -la

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: stlink-tool-windows-x64
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/stlink-tool-windows-x64.exe
            dist/stlink-tool-windows-x64.exe.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
